<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>System Failure</title>
</head>
<body>
    <div class="container">
        <!-- Main Content Box -->
        <div class="main-box">
            <p class="ATTENTION">ATTENTION!</p>
            <p class="text-alert">SYSTEM FAILURE DETECTED</p>
            <p class="text-alert">CRITICAL ERROR IN LIFE SUPPORT SYSTEMS</p>
            <p class="text-alert">EMERGENCY PROTOCOLS INITIATED</p>
        </div>

        <!-- Right Sidebar -->
        <div class="right-box">
            <div class="inventory"><b>Inventory</b></div>
            <div class="clues"><b>Clues</b></div>
        </div>
    </div>

    <!-- Terminal Block -->
    <div class="bottomBlock">
        <textarea class="terminal" rows="10" placeholder="Enter command..."></textarea>
    </div>
</body>
</html>
